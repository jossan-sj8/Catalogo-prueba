<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Gon | Catálogo Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">PROJECT<span>GON</span></div>
            <ul class="nav-menu">
                <li><a href="#" class="active">Catálogo</a></li>
                <li><a href="#">Forma de Compra</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
            <div class="nav-actions">
                <button class="btn-filter-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-sliders"></i> Filtros
                </button>
                <div class="carrito-pill" onclick="toggleCarrito()">
                    <i class="bi bi-bag-heart"></i>
                    <span id="contador-carrito">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="search-hero">
        <div class="search-wrapper">
            <i class="bi bi-search"></i>
            <input type="text" id="buscador" placeholder="¿Qué estás buscando hoy? (Nombre o SKU...)" onkeyup="filtrarTodo()">
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <div class="filter-group">
                    <h4>Categorías</h4>
                    <label class="custom-check">
                        <input type="checkbox" class="cat-check" value="Electronica" checked onchange="filtrarTodo()">
                        <span class="checkmark"></span> Electrónica
                    </label>
                    <label class="custom-check">
                        <input type="checkbox" class="cat-check" value="Accesorios" checked onchange="filtrarTodo()">
                        <span class="checkmark"></span> Accesorios
                    </label>
                </div>
                <div class="filter-group">
                    <h4>Rango de Precio</h4>
                    <input type="range" id="price-range" min="0" max="1000000" step="10000" value="1000000" oninput="filtrarTodo()">
                    <div class="price-label" id="price-val">$1.000.000</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="productos" class="productos-grid"></div>
        </main>
    </div>

    <div id="modal-carrito" class="modal-overlay">
        <div class="carrito-drawer">
            <div class="drawer-header">
                <h3>Mi Pedido</h3>
                <button onclick="toggleCarrito()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="items-carrito" class="drawer-body"></div>
            <div class="drawer-footer">
                <div class="total-row">
                    <span>Subtotal</span>
                    <strong id="total">$0</strong>
                </div>
                <button class="btn-checkout" onclick="enviarPorWhatsApp()">
                    <i class="bi bi-whatsapp"></i> Finalizar Pedido
                </button>
                <button class="btn-empty" onclick="confirmarVaciar()">
                    <i class="bi bi-trash3"></i> Vaciar Carrito
                </button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay confirm-overlay">
        <div class="confirm-card">
            <i class="bi bi-exclamation-circle"></i>
            <h4>¿Vaciar carrito?</h4>
            <p>Se eliminarán todos los productos seleccionados.</p>
            <div class="confirm-btns">
                <button onclick="cerrarConfirmar()" class="btn-cancel">Cancelar</button>
                <button onclick="vaciarCarrito()" class="btn-confirm-action">Sí, vaciar</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>
    <script src="script.js"></script>
</body>
</html>
