<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Gon | Catálogo Corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="header-container">
            <div class="brand">PROJECT<span>GON</span></div>
            <ul class="nav-menu">
                <li><a href="#" class="active">Catálogo</a></li>
                <li><a href="#">Forma de Compra</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
            <div class="nav-actions">
                <div class="carrito-trigger" onclick="toggleCarrito()">
                    <i class="bi bi-bag-check"></i>
                    <span class="badge" id="contador-carrito">0</span>
                </div>
                <div class="user-profile">
                    <span>Admin_01</span>
                    <div class="avatar">PG</div>
                </div>
            </div>
        </div>
    </nav>

    <header class="sub-header">
        <div class="container">
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input type="text" id="buscador" placeholder="Buscar por nombre o SKU..." onkeyup="filtrarTodo()">
            </div>
        </div>
    </header>

    <div class="main-layout container">
        <aside class="sidebar">
            <div class="filter-group">
                <h4>Categorías</h4>
                <label><input type="checkbox" class="cat-check" value="Electronica" checked onchange="filtrarTodo()"> Electrónica</label>
                <label><input type="checkbox" class="cat-check" value="Accesorios" checked onchange="filtrarTodo()"> Accesorios</label>
            </div>
            
            <div class="filter-group">
                <h4>Precio Máximo</h4>
                <input type="range" id="price-range" min="0" max="1000000" step="10000" value="1000000" oninput="filtrarTodo()">
                <div class="range-labels">
                    <span id="price-val">$1.000.000</span>
                </div>
            </div>
        </aside>

        <main id="productos" class="productos-grid"></main>
    </div>

    <div id="modal-carrito" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Mi Pedido</h2>
                <span class="close" onclick="toggleCarrito()">&times;</span>
            </div>
            <div id="items-carrito" class="carrito-body"></div>
            <div class="carrito-footer">
                <div class="total-row">
                    <span>Total a pagar:</span>
                    <strong id="total">$0</strong>
                </div>
                <button class="btn-whatsapp" onclick="enviarPorWhatsApp()">
                    <i class="bi bi-whatsapp"></i> Finalizar Pedido
                </button>
                <button class="btn-vaciar" onclick="vaciarCarrito()">
                    <i class="bi bi-trash3"></i> Vaciar Carrito
                </button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
